receivers:
  otlp:
    protocols:
      grpc: {endpoint: "0.0.0.0:4317"}
      http: {endpoint: "0.0.0.0:4318"}
  prometheus:
    config:
      scrape_configs:
      - job_name: cadvisor
        scrape_interval: 5s
        static_configs:
        - targets: ["cadvisor:8080"]

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"

extensions:
  health_check:
    endpoint: 0.0.0.0:13133


service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      exporters: [prometheus]