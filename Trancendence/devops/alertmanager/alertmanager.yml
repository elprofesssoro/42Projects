global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

  routes:
    - match: 
        severity: critical
      receiver: 'default'
    - match: 
        severity: warning
      receiver: 'default'

receivers:
  - name: 'default'
    # Null receiver - alerts go nowhere
  # - name: 'slack'
  #   slack_configs:
  #     - api_url: 'https://...'
  #       channel: 'alerts'
  # - name: 'pagerduty'
  #   pagerduty_configs:
  #     - service_key: 'just for decoration'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning