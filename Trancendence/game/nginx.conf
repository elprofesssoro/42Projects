worker_processes auto;

events { worker_connections 1024; }

http {
  resolver 127.0.0.11 ipv6=off valid=10s;

  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name localhost 127.0.0.1 _;
    absolute_redirect off;
    return 301 https://$host:3443$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;

    server_name localhost 127.0.0.1 _;
    absolute_redirect off;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    set $up_admin      https://admin_service:3001;
    set $up_auth       https://auth_service:3002;
    set $up_game       https://game_service:3003;
    set $up_social     https://social_service:3004;
    set $up_tournament https://tournament_service:3005;

    location = /health {
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location /uploads/ {
      alias /app/uploads/;
      try_files $uri =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # Socket.IO (chat)
    location ^~ /socket.io/ {
      proxy_pass $up_social;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      proxy_buffering off;
    }

    location ^~ /api/admin { proxy_pass $up_admin; }
    location ^~ /api/auth  { proxy_pass $up_auth; }
    location ^~ /api/users { proxy_pass $up_auth; }
    location ^~ /api/game  { proxy_pass $up_game; }
    location ^~ /api/matches { proxy_pass $up_game; }

    location ^~ /api/social    { proxy_pass $up_social; }
    location ^~ /api/presence  { proxy_pass $up_social; }
    location ^~ /api/friends   { proxy_pass $up_social; }
    location ^~ /api/messages  { proxy_pass $up_social; }
    location ^~ /api/invites   { proxy_pass $up_social; }

    location ^~ /api/tournaments { proxy_pass $up_tournament; }
    location ^~ /api/tournament  { proxy_pass $up_tournament; }

    # Frontend: statische Auslieferung
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}